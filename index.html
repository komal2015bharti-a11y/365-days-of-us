<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>365 Days of Us ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="stars"></div>

  <h1>365 Days of Us ❤️</h1>
  <p class="subtitle">A little piece of my love for you every day</p>

  <div id="calendar" class="calendar"></div>

  <!-- Popup -->
  <div id="popup" class="popup hidden">
    <div class="popup-content">
      <span id="closeBtn">&times;</span>
      <h2 id="popupTitle"></h2>
      <p id="popupMessage"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
